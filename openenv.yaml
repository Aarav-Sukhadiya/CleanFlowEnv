spec_version: 1
name: CleanFlowEnv
type: space
runtime: fastapi
app: server.app:app
port: 7860
version: "1.0"
description: >
  An OpenEnv-compliant environment for evaluating AI agents on
  real-world data cleaning and ETL workflows. Agents iteratively
  transform messy datasets into clean, analysis-ready tables using
  structured actions with budget constraints.
tags:
  - openenv
  - data-cleaning
  - etl
  - tabular

endpoints:
  reset:
    path: /reset
    method: POST
  step:
    path: /step
    method: POST
  state:
    path: /state
    method: GET
  tasks:
    path: /tasks
    method: GET
  grader:
    path: /grader
    method: GET
  grade:
    path: /grade/{task_id}
    method: POST
  baseline:
    path: /baseline
    method: POST

tasks:
  - id: task_easy
    name: Basic Cleaning
    difficulty: easy
    description: "Fill missing values and remove duplicates in employee survey data (200 rows, 5 columns)."
    budget: 20
    expected_baseline_score: 0.94
  - id: task_medium
    name: Schema Normalization
    difficulty: medium
    description: "Convert mixed-format dates, currency strings, and boolean variants in transaction data (300 rows, 6 columns)."
    budget: 20
    expected_baseline_score: 0.92
  - id: task_hard
    name: Advanced Cleaning
    difficulty: hard
    description: "Remove outliers, normalize IDs, and fix date typos in medical trial records (400 rows, 8 columns)."
    budget: 20
    expected_baseline_score: 0.88
  - id: task_expert
    name: Budget-Constrained Cleaning
    difficulty: expert
    description: "All issue types combined with distractor columns under a tight 15-credit budget (500 rows, 10 columns)."
    budget: 15
    expected_baseline_score: 0.88
  - id: task_multi
    name: Multi-Table Cleaning
    difficulty: expert+
    description: "Two linked tables (customers 100 rows, orders 300 rows) with FK relationships, orphan keys, mixed formats, and cross-table issues."
    budget: 25
    expected_baseline_score: 0.85

score_range:
  min: 0.0001
  max: 0.9999
  exclusive: true
deterministic: true
random_seed: 42

scoring:
  formula: "0.40 * quality_overall + 0.20 * validation + 0.15 * efficiency + 0.10 * action_quality + 0.15 * schema_accuracy"
  components:
    quality_overall:
      weight: 0.40
      description: "Weighted quality metric: 0.6 * correctness + 0.3 * completeness + 0.1 * schema_accuracy"
    validation:
      weight: 0.20
      description: "Fraction of data validation rules passed (nulls, duplicates, types, ranges, row count)"
    efficiency:
      weight: 0.15
      description: "1 - (budget_used / total_budget)"
    action_quality:
      weight: 0.10
      description: "1 - (redundant_actions / total_actions)"
    schema_accuracy:
      weight: 0.15
      description: "Fraction of columns with correct dtype matching ground truth"

action_types:
  fill_null:
    required_fields: [column, method]
    cost: 1
    methods: [mean, median, mode, constant, forward_fill, backward_fill, sequential]
  drop_duplicates:
    required_fields: []
    cost: 1
  strip_whitespace:
    required_fields: [column]
    cost: 1
  replace_substring:
    required_fields: [column, old_value, new_value]
    cost: 1
  convert_type:
    required_fields: [column, target_type]
    cost: 2
    target_types: [int, float, datetime, string]
  map_values:
    required_fields: [column, mapping]
    cost: 2
  normalize:
    required_fields: [column]
    cost: 2
    methods: [minmax, zscore]
  remove_outliers:
    required_fields: [column]
    cost: 3
    rule: "IQR x 1.5 exclusively"
  lookup_fill:
    required_fields: [column, table, foreign_key_column, lookup_table, lookup_key_column, lookup_value_column]
    cost: 2
    description: "Fill nulls via FK lookup from another table"
  validate_foreign_key:
    required_fields: [column, table, foreign_key_column, lookup_table, lookup_key_column]
    cost: 2
    description: "Remove rows with orphan FK values"
